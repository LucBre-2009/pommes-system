<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speisekarte</title>

<style>

body{
font-family:Arial;
text-align:center;
background:white;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin:40px;
}

.card{
background:#ffd966;
padding:30px;
border-radius:15px;
width:200px;
font-size:25px;
}

</style>

</head>

<body>

<h1>Speisekarte</h1>

<h2>Menü</h2>

<div class="menu">

<div class="card">Pommes klein</div>
<div class="card">Pommes groß</div>

</div>

<h2>Extras</h2>

<div class="menu">

<div class="card">Mayonnaise</div>
<div class="card">Ketchup</div>
<div class="card">Pommes Soße</div>

</div>

</body>
</html>
