<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Küche</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#222;
color:white;
text-align:center;
}

.order{
background:#333;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
font-size:20px;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Küche</h1>

<div id="orders"></div>

<script>

const socket=io()

socket.on("orders",orders=>{

const container=document.getElementById("orders")
container.innerHTML=""

orders.forEach(o=>{

const div=document.createElement("div")
div.className="order"

div.innerHTML=`
<h2>${o.number}</h2>
<p>${o.item}</p>
<p>${o.extras.join(", ")}</p>
<button onclick="finish('${o.id}')">Fertig</button>
`

container.appendChild(div)

})

})

function finish(id){

socket.emit("finish",id)

}

</script>

</body>
</html>
